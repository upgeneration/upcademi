<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - UPCADEMI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-page {
            padding: 40px 0;
            min-height: 80vh;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .dashboard-header h1 {
            color: var(--navy);
            font-size: 28px;
        }

        .dashboard-header .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--white);
            padding: 8px 16px 8px 20px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .dashboard-header .user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--navy);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Stats */
        .stats-grid-user {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card-user {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stat-card-user .number {
            font-size: 32px;
            font-weight: 800;
            color: var(--navy);
        }

        .stat-card-user .label {
            font-size: 14px;
            color: var(--text-gray);
        }

        /* Paket Aktif */
        .paket-aktif {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .paket-aktif h3 {
            color: var(--navy);
            margin-bottom: 12px;
        }

        .paket-aktif .paket-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .paket-aktif .paket-item:last-child {
            border-bottom: none;
        }

        .paket-aktif .paket-name {
            font-weight: 700;
            color: var(--text-dark);
        }

        .paket-aktif .paket-status {
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .paket-aktif .paket-status.active {
            background: #E8F5E9;
            color: var(--green);
        }

        .paket-aktif .paket-status.expired {
            background: #FFEBEE;
            color: var(--red);
        }

        .paket-aktif .btn-tryout {
            padding: 6px 20px;
            background: var(--red);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .paket-aktif .btn-tryout:hover {
            background: var(--red-dark);
        }

        /* Riwayat */
        .riwayat {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .riwayat h3 {
            color: var(--navy);
            margin-bottom: 12px;
        }

        .riwayat table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .riwayat th {
            background: var(--gray-bg);
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-dark);
        }

        .riwayat td {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .riwayat .badge-score {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .riwayat .badge-score.high {
            background: #E8F5E9;
            color: var(--green);
        }

        .riwayat .badge-score.medium {
            background: #FFF3E0;
            color: #FF9800;
        }

        .riwayat .badge-score.low {
            background: #FFEBEE;
            color: var(--red);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-gray);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            .stats-grid-user {
                grid-template-columns: 1fr 1fr;
            }

            .dashboard-header h1 {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid-user {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="UPCADEMI" style="height: 40px;">
                <span>UPCADEMI</span>
            </a>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html">Beranda</a>
                <a href="packages.html">Paket</a>
                <a href="leaderboard.html">Peringkat</a>
                <a href="#" style="background: rgba(255,255,255,0.15);">Dashboard</a>
                <a href="login.html" class="btn-login">Logout</a>
            </div>
        </div>
    </nav>

    <!-- ===== DASHBOARD ===== -->
    <section class="dashboard-page">
        <div class="container">

            <!-- Header -->
            <div class="dashboard-header">
                <h1>👋 Selamat Datang, <span id="userName">User</span>!</h1>
                <div class="user-info">
                    <span id="userEmail">user@email.com</span>
                    <div class="avatar" id="userAvatar">U</div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid-user">
                <div class="stat-card-user">
                    <div class="number" id="totalTryout">0</div>
                    <div class="label">📝 Total Tryout</div>
                </div>
                <div class="stat-card-user">
                    <div class="number" id="avgScore">0</div>
                    <div class="label">📊 Rata-rata Skor</div>
                </div>
                <div class="stat-card-user">
                    <div class="number" id="bestScore">0</div>
                    <div class="label">🏆 Skor Tertinggi</div>
                </div>
            </div>

            <!-- Paket Aktif -->
            <div class="paket-aktif">
                <h3>📦 Paket Tryout Aktif</h3>
                <div id="paketAktifContainer">
                    <!-- JS akan generate -->
                </div>
            </div>

            <!-- Riwayat Tryout -->
            <div class="riwayat">
                <h3>📋 Riwayat Tryout</h3>
                <div id="riwayatContainer">
                    <!-- JS akan generate -->
                </div>
            </div>

        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="tentang.html">Tentang Kami</a>
                <a href="kontak.html">Kontak</a>
                <a href="privasi.html">Kebijakan Privasi</a>
                <a href="syarat.html">Syarat & Ketentuan</a>
            </div>
            <div class="copyright">&copy; 2026 UPCADEMI. All rights reserved.</div>
        </div>
    </footer>

   <script src="js/script.js"></script>
<script>
    // =============================================
    // ===== AMBIL DATA USER DARI localStorage =====
    // =============================================

    const userEmail = localStorage.getItem('userEmail') || 'user@email.com';
    const userName = localStorage.getItem('userName') || 'User';

    document.getElementById('userName').textContent = userName;
    document.getElementById('userEmail').textContent = userEmail;
    document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();

    // =============================================
    // ===== AMBIL PAKET AKTIF DARI PESANAN =====
    // =============================================

    function getPesananUser() {
        const allPesanan = JSON.parse(localStorage.getItem('pesananUpcademi') || '[]');
        return allPesanan.filter(p => p.userEmail === userEmail && p.status === 'aktif');
    }

    function renderPaketAktif() {
        const container = document.getElementById('paketAktifContainer');
        if (!container) return;

        const paketAktif = getPesananUser();

        if (paketAktif.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📦</div>
                    <p>Anda belum memiliki paket tryout aktif.</p>
                    <a href="packages.html" style="color:var(--red); font-weight:600;">Beli paket sekarang →</a>
                </div>
            `;
            return;
        }

        container.innerHTML = paketAktif.map(item => {
            return `
                <div class="paket-item">
                    <div>
                        <div class="paket-name">${item.paketName || 'Paket Tryout'}</div>
                        <div style="font-size:12px; color:var(--text-gray);">
                            ✅ Aktif sejak ${item.tanggal || 'hari ini'}
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                        <span class="paket-status active">✅ Aktif</span>
                        <button class="btn-tryout" onclick="window.location.href='exam.html?paket=${item.paketId}'">
    🚀 Kerjakan Tryout
</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // =============================================
// ===== RIWAYAT TRYOUT DARI LOCALSTORAGE =====
// =============================================

function renderRiwayat() {
    const container = document.getElementById('riwayatContainer');
    if (!container) return;

    const userEmail = localStorage.getItem('userEmail');
    if (!userEmail) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="icon">🔒</div>
                <p>Silakan login untuk melihat riwayat tryout.</p>
            </div>
        `;
        return;
    }

    // Ambil semua hasil tryout dari localStorage
    const semuaHasil = JSON.parse(localStorage.getItem('hasilTryout') || '[]');
    
    // Filter hasil berdasarkan user yang login
    const riwayatUser = semuaHasil.filter(item => item.userEmail === userEmail);

    if (riwayatUser.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="icon">📋</div>
                <p>Belum ada riwayat tryout. Yuk, kerjakan tryout pertama Anda!</p>
            </div>
        `;
        return;
    }

    // Tampilkan riwayat terbaru di atas
    const sorted = riwayatUser.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

    let html = `
        <table>
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Paket</th>
                    <th>Skor</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
    `;

    sorted.forEach(item => {
        const score = item.skor || 0;
        const total = item.total || score;
        const scoreClass = score >= 80 ? 'high' : score >= 60 ? 'medium' : 'low';
        const status = score >= 80 ? '✅ Lulus' : score >= 60 ? '📖 Perlu Belajar' : '📚 Perlu Bimbingan';
        
        html += `
            <tr>
                <td>${new Date(item.tanggal).toLocaleDateString('id-ID')}</td>
                <td>${item.paket || 'Tryout'}</td>
                <td><strong>${score} / ${total}</strong></td>
                <td><span class="badge-score ${scoreClass}">${status}</span></td>
            </tr>
        `;
    });

    html += `</tbody></table>`;
    container.innerHTML = html;
}

    // =============================================
    // ===== UPDATE STATS =====
    // =============================================

   function updateStats() {
    const userEmail = localStorage.getItem('userEmail');
    if (!userEmail) return;

    const semuaHasil = JSON.parse(localStorage.getItem('hasilTryout') || '[]');
    const riwayatUser = semuaHasil.filter(item => item.userEmail === userEmail);

    const total = riwayatUser.length;
    const totalScore = riwayatUser.reduce((sum, item) => sum + (item.skor || 0), 0);
    const avg = total > 0 ? Math.round(totalScore / total) : 0;
    const best = total > 0 ? Math.max(...riwayatUser.map(item => item.skor || 0)) : 0;

    document.getElementById('totalTryout').textContent = total;
    document.getElementById('avgScore').textContent = avg;
    document.getElementById('bestScore').textContent = best;
}
    }

    // =============================================
    // ===== NAVBAR (LOGOUT) =====
    // =============================================

    // Override logout di navbar
    document.querySelector('.btn-login')?.addEventListener('click', function(e) {
        e.preventDefault();
        if (confirm('Yakin ingin logout?')) {
            localStorage.removeItem('isAdmin');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userName');
            window.location.href = 'index.html';
        }
    });

    // =============================================
    // ===== INIT =====
    // =============================================

    document.addEventListener('DOMContentLoaded', function() {
        renderPaketAktif();
        renderRiwayat();
        updateStats();
    });
</script>

</body>
</html>
