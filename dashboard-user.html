<script src="js/script.js"></script>
<script>
    // =============================================
    // ===== AMBIL DATA USER DARI localStorage =====
    // =============================================

    const userEmail = localStorage.getItem('userEmail') || 'user@email.com';
    const userName = localStorage.getItem('userName') || 'User';

    document.getElementById('userName').textContent = userName;
    document.getElementById('userEmail').textContent = userEmail;
    document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();

    // =============================================
    // ===== AMBIL PAKET AKTIF DARI PESANAN =====
    // =============================================

    function getPesananUser() {
        const allPesanan = JSON.parse(localStorage.getItem('pesananUpcademi') || '[]');
        return allPesanan.filter(p => p.userEmail === userEmail && p.status === 'aktif');
    }

    function renderPaketAktif() {
        const container = document.getElementById('paketAktifContainer');
        if (!container) return;

        const paketAktif = getPesananUser();

        if (paketAktif.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📦</div>
                    <p>Anda belum memiliki paket tryout aktif.</p>
                    <a href="packages.html" style="color:var(--red); font-weight:600;">Beli paket sekarang →</a>
                </div>
            `;
            return;
        }

        container.innerHTML = paketAktif.map(item => {
            return `
                <div class="paket-item">
                    <div>
                        <div class="paket-name">${item.paketName || 'Paket Tryout'}</div>
                        <div style="font-size:12px; color:var(--text-gray);">
                            ✅ Aktif sejak ${item.tanggal || 'hari ini'}
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                        <span class="paket-status active">✅ Aktif</span>
                        <button class="btn-tryout" onclick="window.location.href='exam.html?paket=${item.paketId}'">
                            🚀 Kerjakan Tryout
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // =============================================
    // ===== RIWAYAT TRYOUT DARI LOCALSTORAGE =====
    // =============================================

    function renderRiwayat() {
        const container = document.getElementById('riwayatContainer');
        if (!container) return;

        // Ambil semua hasil tryout dari localStorage
        const semuaHasil = JSON.parse(localStorage.getItem('hasilTryout') || '[]');
        
        // Filter berdasarkan user yang login
        const riwayatUser = semuaHasil.filter(item => item.userEmail === userEmail);

        if (riwayatUser.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📋</div>
                    <p>Belum ada riwayat tryout. Yuk, kerjakan tryout pertama Anda!</p>
                </div>
            `;
            return;
        }

        // Urutkan dari yang terbaru
        const sorted = riwayatUser.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Paket</th>
                        <th>Skor</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
        `;

        sorted.forEach(item => {
            const score = item.skor || 0;
            const total = item.total || score;
            const scoreClass = score >= 80 ? 'high' : score >= 60 ? 'medium' : 'low';
            const status = score >= 80 ? '✅ Lulus' : score >= 60 ? '📖 Perlu Belajar' : '📚 Perlu Bimbingan';
            
            html += `
                <tr>
                    <td>${new Date(item.tanggal).toLocaleDateString('id-ID')}</td>
                    <td>${item.paket || 'Tryout'}</td>
                    <td><strong>${score} / ${total}</strong></td>
                    <td><span class="badge-score ${scoreClass}">${status}</span></td>
                </tr>
            `;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    // =============================================
    // ===== UPDATE STATS =====
    // =============================================

    function updateStats() {
        const semuaHasil = JSON.parse(localStorage.getItem('hasilTryout') || '[]');
        const riwayatUser = semuaHasil.filter(item => item.userEmail === userEmail);

        const total = riwayatUser.length;
        const totalScore = riwayatUser.reduce((sum, item) => sum + (item.skor || 0), 0);
        const avg = total > 0 ? Math.round(totalScore / total) : 0;
        const best = total > 0 ? Math.max(...riwayatUser.map(item => item.skor || 0)) : 0;

        document.getElementById('totalTryout').textContent = total;
        document.getElementById('avgScore').textContent = avg;
        document.getElementById('bestScore').textContent = best;
    }

    // =============================================
    // ===== NAVBAR (LOGOUT) =====
    // =============================================

    document.querySelector('.btn-login')?.addEventListener('click', function(e) {
        e.preventDefault();
        if (confirm('Yakin ingin logout?')) {
            localStorage.removeItem('isAdmin');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userName');
            window.location.href = 'index.html';
        }
    });

    // =============================================
    // ===== INIT =====
    // =============================================

    document.addEventListener('DOMContentLoaded', function() {
        renderPaketAktif();
        renderRiwayat();
        updateStats();
    });
</script>
