<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Tryout - UPCADEMI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .result-page {
            padding: 40px 0;
        }

        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .result-header h1 {
            font-size: 32px;
            color: var(--navy);
        }

        .result-header .score {
            font-size: 72px;
            font-weight: 800;
            color: var(--red);
            margin: 16px 0;
        }

        .result-header .score-label {
            color: var(--text-gray);
            font-size: 18px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card .number.green { color: var(--green); }
        .stat-card .number.red { color: var(--red); }
        .stat-card .number.orange { color: #FF9800; }

        .stat-card .label {
            font-size: 14px;
            color: var(--text-gray);
        }

        .pembahasan-section {
            max-width: 800px;
            margin: 0 auto;
        }

        .pembahasan-section h2 {
            text-align: center;
            color: var(--navy);
            margin-bottom: 30px;
            font-size: 28px;
        }

        .soal-card {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border-left: 4px solid var(--green);
        }

        .soal-card.wrong {
            border-left-color: var(--red);
        }

        .soal-card .soal-header {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--navy);
        }

        .soal-card .soal-header .status {
            font-size: 14px;
        }

        .soal-card .soal-header .status.benar { color: var(--green); }
        .soal-card .soal-header .status.salah { color: var(--red); }

        .soal-card .soal-text {
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.8;
        }

        .soal-card .soal-text img {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }

        .soal-card .jawaban-user {
            font-size: 14px;
            color: var(--text-gray);
        }

        .soal-card .jawaban-benar {
            font-size: 14px;
            color: var(--green);
            font-weight: 600;
        }

        .soal-card .pembahasan {
            margin-top: 12px;
            padding: 16px;
            background: var(--gray-bg);
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.8;
        }

        .btn-back {
            display: block;
            max-width: 300px;
            margin: 30px auto 0;
            padding: 14px;
            background: var(--navy);
            color: var(--white);
            text-align: center;
            border-radius: 8px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--navy-light);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .result-header .score {
                font-size: 48px;
            }

            .result-stats {
                grid-template-columns: 1fr 1fr;
            }

            .soal-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="UPCADEMI" style="height: 40px;">
                <span>UPCADEMI</span>
            </a>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html">Beranda</a>
                <a href="packages.html">Paket</a>
                <a href="leaderboard.html">Peringkat</a>
                <a href="#" style="background: rgba(255,255,255,0.15);">Hasil</a>
                <a href="login.html" class="btn-login">Logout</a>
            </div>
        </div>
    </nav>

    <!-- ===== RESULT SECTION ===== -->
    <section class="result-page">
        <div class="container">
            <div class="result-header">
                <h1>📊 Hasil Tryout</h1>
                <div class="score" id="scoreDisplay">0</div>
                <div class="score-label">dari <span id="totalDisplay">0</span> soal</div>
            </div>

            <div class="result-stats">
                <div class="stat-card">
                    <div class="number green" id="benarCount">0</div>
                    <div class="label">✅ Benar</div>
                </div>
                <div class="stat-card">
                    <div class="number red" id="salahCount">0</div>
                    <div class="label">❌ Salah</div>
                </div>
                <div class="stat-card">
                    <div class="number orange" id="tidakDijawabCount">0</div>
                    <div class="label">⬜ Tidak Dijawab</div>
                </div>
            </div>

            <!-- Pembahasan -->
            <div class="pembahasan-section">
                <h2>📖 Pembahasan Soal</h2>
                <div id="pembahasanContainer"></div>
            </div>

            <a href="packages.html" class="btn-back">← Kembali ke Paket Tryout</a>
        </div>
    </section>

    <script src="js/script.js"></script>
<script>
    // =============================================
    // ===== AMBIL DATA DARI LOCALSTORAGE =====
    // =============================================

    // Ambil hasil tryout dari localStorage (dikirim dari exam.html)
    const result = JSON.parse(localStorage.getItem('examResult'));

    if (!result) {
        alert('⚠️ Tidak ada hasil tryout. Silakan kerjakan tryout terlebih dahulu.');
        window.location.href = 'packages.html';
    }

    // Ambil semua soal dari localStorage
    const semuaSoal = JSON.parse(localStorage.getItem('soalUpcademi') || '[]');

    // Ambil parameter paket dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const paketId = urlParams.get('paket');

    // Filter soal berdasarkan paket
    let soalData = [];
    let paketName = '';

    if (paketId) {
        const paket = JSON.parse(localStorage.getItem('paketUpcademi') || '[]').find(p => p.id == paketId);
        if (paket) {
            paketName = paket.name;
            soalData = semuaSoal.filter(s => s.paket === paketName);
        }
    }

    // Jika tidak ada soal, pakai default
    if (soalData.length === 0) {
        soalData = [
            { id: 1, number: 1, text: 'Belum ada soal untuk paket ini.', options: ['-', '-', '-', '-', '-'], correct: 0, pembahasan: 'Tidak ada pembahasan.' }
        ];
    }

    // ===== GABUNGKAN DENGAN JAWABAN USER =====
    const userAnswers = result.answers || [];
    const total = result.totalQuestions || soalData.length;

    // Gabungkan soal dengan jawaban user
    const soalDenganJawaban = soalData.map((q, index) => {
        const userAns = userAnswers[index] !== undefined ? userAnswers[index] : null;
        let status = 'tidak-dijawab';
        let isCorrect = false;

        if (userAns === null || userAns === undefined) {
            status = 'tidak-dijawab';
        } else if (userAns === q.correct) {
            status = 'benar';
            isCorrect = true;
        } else {
            status = 'salah';
        }

        return {
            ...q,
            userAnswer: userAns,
            isCorrect: isCorrect,
            status: status
        };
    });

    // ===== HITUNG SKOR =====
    let benar = soalDenganJawaban.filter(q => q.status === 'benar').length;
    let salah = soalDenganJawaban.filter(q => q.status === 'salah').length;
    let tidakDijawab = soalDenganJawaban.filter(q => q.status === 'tidak-dijawab').length;

    // ===== TAMPILKAN SKOR =====
    document.getElementById('scoreDisplay').textContent = benar;
    document.getElementById('totalDisplay').textContent = total;
    document.getElementById('benarCount').textContent = benar;
    document.getElementById('salahCount').textContent = salah;
    document.getElementById('tidakDijawabCount').textContent = tidakDijawab;

    // ===== TAMPILKAN PEMBAHASAN =====
    const container = document.getElementById('pembahasanContainer');
    const optionLabels = ['A', 'B', 'C', 'D', 'E'];

    soalDenganJawaban.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'soal-card' + (q.status === 'salah' ? ' wrong' : '');

        const statusText = q.status === 'benar' ? '✅ Benar' : 
                          q.status === 'salah' ? '❌ Salah' : '⬜ Tidak Dijawab';
        const statusClass = q.status === 'benar' ? 'benar' : 
                           q.status === 'salah' ? 'salah' : '';

        const imageHTML = q.image ? `<img src="${q.image}" alt="Gambar soal" style="max-width:100%; border-radius:8px; margin:8px 0; border:1px solid #E0E0E0;">` : '';

        const pembahasanImageHTML = q.pembahasanGambar ? 
            `<img src="${q.pembahasanGambar}" alt="Gambar pembahasan" style="max-width:100%; border-radius:8px; margin:8px 0; border:1px solid #E0E0E0;">` : '';

        const userAnswerText = q.userAnswer !== null && q.userAnswer !== undefined ? 
            optionLabels[q.userAnswer] + '. ' + (q.options ? q.options[q.userAnswer] : '-') : 
            'Tidak dijawab';

        let userOptionImage = '';
        if (q.userAnswer !== null && q.userAnswer !== undefined && q.optionImages && q.optionImages[q.userAnswer]) {
            userOptionImage = `<br><img src="${q.optionImages[q.userAnswer]}" style="max-width:100px; border-radius:6px; border:1px solid #E0E0E0; margin-top:4px;">`;
        }

        card.innerHTML = `
            <div class="soal-header">
                <span>Soal ${q.number || index + 1}</span>
                <span class="status ${statusClass}">${statusText}</span>
            </div>
            <div class="soal-text">${imageHTML}${q.text}</div>
            <div class="jawaban-user">Jawaban Anda: <strong>${userAnswerText}</strong>${userOptionImage}</div>
            <div class="jawaban-benar">✅ Jawaban Benar: ${optionLabels[q.correct]}. ${q.options ? q.options[q.correct] : '-'}</div>
            <div class="pembahasan">
                <strong>💡 Pembahasan:</strong> ${q.pembahasan || 'Tidak ada pembahasan.'}
                ${pembahasanImageHTML}
            </div>
        `;

        container.appendChild(card);
    });

    // Hapus data examResult setelah ditampilkan (opsional)
    // localStorage.removeItem('examResult');
</script>
</body>
</html>
