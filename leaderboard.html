<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peringkat - UPCADEMI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .leaderboard-page {
            padding: 40px 0;
        }
        .leaderboard-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .leaderboard-header h1 {
            font-size: 36px;
            color: var(--navy);
        }
        .leaderboard-header p {
            color: var(--text-gray);
            font-size: 18px;
        }
        .filter-leaderboard {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .filter-leaderboard select {
            padding: 10px 20px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            background: var(--white);
            color: var(--text-dark);
            cursor: pointer;
        }
        .filter-leaderboard select:focus {
            border-color: var(--navy);
            outline: none;
        }
        .leaderboard-table {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 900px;
            margin: 0 auto;
        }
        .leaderboard-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .leaderboard-table thead {
            background: var(--navy);
            color: var(--white);
        }
        .leaderboard-table thead th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }
        .leaderboard-table tbody td {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .leaderboard-table tbody tr:hover {
            background: #F5F7FA;
        }
        .leaderboard-table tbody tr:last-child td {
            border-bottom: none;
        }
        .rank-number {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
            font-size: 14px;
        }
        .rank-1 { background: #FFD700; color: #8B6914; }
        .rank-2 { background: #C0C0C0; color: #555; }
        .rank-3 { background: #CD7F32; color: #fff; }
        .rank-other { background: #E0E0E0; color: var(--text-gray); }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--navy-light);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }
        .user-name {
            font-weight: 600;
            color: var(--text-dark);
        }
        .user-paket {
            font-size: 12px;
            color: var(--text-gray);
        }
        .badge-score {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
        }
        .badge-score.high { background: #E8F5E9; color: var(--green); }
        .badge-score.medium { background: #FFF3E0; color: #FF9800; }
        .badge-score.low { background: #FFEBEE; color: var(--red); }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 8px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            background: var(--white);
            color: var(--text-dark);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .pagination button:hover {
            border-color: var(--navy);
            color: var(--navy);
        }
        .pagination button.active {
            background: var(--navy);
            color: var(--white);
            border-color: var(--navy);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        @media (max-width: 768px) {
            .leaderboard-table {
                overflow-x: auto;
            }
            .leaderboard-table table {
                min-width: 600px;
            }
            .leaderboard-header h1 {
                font-size: 28px;
            }
            .filter-leaderboard {
                flex-direction: column;
                align-items: center;
            }
            .filter-leaderboard select {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="UPCADEMI" style="height: 40px;">
                <span>UPCADEMI</span>
            </a>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html">Beranda</a>
                <a href="packages.html">Paket</a>
                <a href="leaderboard.html" style="background: rgba(255,255,255,0.15);">Peringkat</a>
                <div id="navbarLogin">
                    <!-- Akan diisi oleh JavaScript -->
                </div>
            </div>
        </div>
    </nav>

    <!-- ===== LEADERBOARD SECTION ===== -->
    <section class="leaderboard-page">
        <div class="container">
            <div class="leaderboard-header">
                <h1>🏆 Peringkat Siswa</h1>
                <p>Lihat peringkat siswa berdasarkan skor tryout tertinggi</p>
            </div>

            <div class="filter-leaderboard">
                <select id="filterPaket">
                    <option value="all">Semua Paket</option>
                </select>
            </div>

            <div class="leaderboard-table">
                <table>
                    <thead>
                        <tr>
                            <th style="width:60px;">Rank</th>
                            <th>Nama</th>
                            <th style="width:150px;">Paket</th>
                            <th style="width:100px; text-align:center;">Skor</th>
                            <th style="width:120px; text-align:center;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <!-- Data akan di-generate JS -->
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination">
                <!-- JS akan generate -->
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="tentang.html">Tentang Kami</a>
                <a href="kontak.html">Kontak</a>
                <a href="privasi.html">Kebijakan Privasi</a>
                <a href="syarat.html">Syarat & Ketentuan</a>
            </div>
            <div class="copyright">&copy; 2026 UPCADEMI. All rights reserved.</div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // =============================================
        // ===== AMBIL HASIL TRYOUT DARI LOCALSTORAGE =====
        // =============================================

        function getHasilTryout() {
            return JSON.parse(localStorage.getItem('hasilTryout') || '[]');
        }

        function getPaketList() {
            const hasil = getHasilTryout();
            const paketSet = new Set();
            hasil.forEach(item => {
                if (item.paket) paketSet.add(item.paket);
            });
            return Array.from(paketSet);
        }

        // =============================================
        // ===== RENDER LEADERBOARD =====
        // =============================================

        let currentPage = 1;
        const itemsPerPage = 10;

        function renderLeaderboard(page = 1) {
            const filterPaket = document.getElementById('filterPaket').value;
            const tbody = document.getElementById('leaderboardBody');
            if (!tbody) return;

            let hasil = getHasilTryout();

            // Filter berdasarkan paket
            if (filterPaket !== 'all') {
                hasil = hasil.filter(item => item.paket === filterPaket);
            }

            // Kelompokkan berdasarkan user dan paket, ambil skor tertinggi
            const userBest = {};
            hasil.forEach(item => {
                const key = item.userEmail + '|' + item.paket;
                if (!userBest[key] || item.skor > userBest[key].skor) {
                    userBest[key] = {
                        userName: item.userName || 'User',
                        userEmail: item.userEmail,
                        paket: item.paket,
                        skor: item.skor,
                        total: item.total || item.skor,
                        tanggal: item.tanggal
                    };
                }
            });

            // Konversi ke array dan urutkan berdasarkan skor tertinggi
            let leaderboardData = Object.values(userBest);
            leaderboardData.sort((a, b) => b.skor - a.skor);

            // Beri peringkat
            leaderboardData = leaderboardData.map((item, index) => {
                return {
                    ...item,
                    rank: index + 1,
                    status: item.skor >= 80 ? 'Lulus' : item.skor >= 60 ? 'Perlu Belajar' : 'Perlu Bimbingan'
                };
            });

            // Pagination
            const totalItems = leaderboardData.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, totalItems);
            const pageData = leaderboardData.slice(startIndex, endIndex);

            // Render tabel
            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="icon">📊</div>
                                <p>Belum ada data peringkat. Ayo kerjakan tryout!</p>
                            </div>
                        </td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = pageData.map((item) => {
                    const rankClass = item.rank === 1 ? 'rank-1' : 
                                     item.rank === 2 ? 'rank-2' : 
                                     item.rank === 3 ? 'rank-3' : 'rank-other';

                    const scoreClass = item.skor >= 80 ? 'high' : 
                                      item.skor >= 60 ? 'medium' : 'low';

                    const initials = (item.userName || 'U').split(' ').map(n => n[0]).join('').slice(0, 2);

                    return `
                        <tr>
                            <td><span class="rank-number ${rankClass}">${item.rank}</span></td>
                            <td>
                                <div class="user-info">
                                    <div class="user-avatar">${initials}</div>
                                    <div>
                                        <div class="user-name">${item.userName}</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="user-paket">${item.paket}</span></td>
                            <td style="text-align:center; font-weight:700; color:var(--navy);">
                                ${item.skor} / ${item.total || item.skor}
                            </td>
                            <td style="text-align:center;">
                                <span class="badge-score ${scoreClass}">${item.status}</span>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            // Render pagination
            renderPagination(totalPages, page);
        }

        // =============================================
        // ===== RENDER PAGINATION =====
        // =============================================

        function renderPagination(totalPages, currentPage) {
            const container = document.getElementById('pagination');
            if (!container) return;

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>⬅</button>`;

            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>➡</button>`;

            container.innerHTML = html;
        }

        // =============================================
        // ===== GO TO PAGE =====
        // =============================================

        function goToPage(page) {
            const hasil = getHasilTryout();
            const filterPaket = document.getElementById('filterPaket').value;
            
            let filtered = hasil;
            if (filterPaket !== 'all') {
                filtered = filtered.filter(item => item.paket === filterPaket);
            }

            const userBest = {};
            filtered.forEach(item => {
                const key = item.userEmail + '|' + item.paket;
                if (!userBest[key] || item.skor > userBest[key].skor) {
                    userBest[key] = {
                        userName: item.userName || 'User',
                        userEmail: item.userEmail,
                        paket: item.paket,
                        skor: item.skor,
                        total: item.total || item.skor,
                        tanggal: item.tanggal
                    };
                }
            });

            const totalItems = Object.keys(userBest).length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);

            if (page < 1 || page > totalPages) return;

            currentPage = page;
            renderLeaderboard(page);
        }

        // =============================================
        // ===== UPDATE DROPDOWN FILTER PAKET =====
        // =============================================

        function updateFilterPaket() {
            const select = document.getElementById('filterPaket');
            if (!select) return;

            const paketList = getPaketList();
            select.innerHTML = '<option value="all">Semua Paket</option>';
            paketList.forEach(paket => {
                select.innerHTML += `<option value="${paket}">${paket}</option>`;
            });
        }

        // =============================================
        // ===== UPDATE NAVBAR =====
        // =============================================

        function updateNavbar() {
            const container = document.getElementById('navbarLogin');
            if (!container) return;

            const isAdmin = localStorage.getItem('isAdmin') === 'true';
            const isLoggedIn = localStorage.getItem('userEmail') !== null;

            if (isLoggedIn) {
                if (isAdmin) {
                    container.innerHTML = `
                        <a href="dashboard-admin.html" style="background: rgba(255,255,255,0.15);">Admin</a>
                        <a href="#" onclick="logout()" class="btn-login">Logout</a>
                    `;
                } else {
                    container.innerHTML = `
                        <a href="dashboard-user.html" style="background: rgba(255,255,255,0.15);">Dashboard</a>
                        <a href="#" onclick="logout()" class="btn-login">Logout</a>
                    `;
                }
            } else {
                container.innerHTML = `
                    <a href="register.html" class="btn-register">Daftar</a>
                    <a href="login.html" class="btn-login">Login</a>
                `;
            }
        }

        function logout() {
            if (confirm('Yakin ingin logout?')) {
                localStorage.removeItem('isAdmin');
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userName');
                window.location.href = 'index.html';
            }
        }

        // =============================================
        // ===== EVENT LISTENER =====
        // =============================================

        document.getElementById('filterPaket').addEventListener('change', function() {
            currentPage = 1;
            renderLeaderboard(1);
        });

        // =============================================
        // ===== INIT =====
        // =============================================

        document.addEventListener('DOMContentLoaded', function() {
            updateNavbar();
            updateFilterPaket();
            renderLeaderboard(1);
        });
    </script>
</body>
</html>
