<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peringkat - UPCADEMI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .leaderboard-page {
            padding: 40px 0;
        }

        .leaderboard-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .leaderboard-header h1 {
            font-size: 36px;
            color: var(--navy);
        }

        .leaderboard-header p {
            color: var(--text-gray);
            font-size: 18px;
        }

        .filter-leaderboard {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .filter-leaderboard select {
            padding: 10px 20px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            background: var(--white);
            color: var(--text-dark);
            cursor: pointer;
        }

        .filter-leaderboard select:focus {
            border-color: var(--navy);
            outline: none;
        }

        .leaderboard-table {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 900px;
            margin: 0 auto;
        }

        .leaderboard-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table thead {
            background: var(--navy);
            color: var(--white);
        }

        .leaderboard-table thead th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        .leaderboard-table tbody td {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .leaderboard-table tbody tr:hover {
            background: #F5F7FA;
        }

        .leaderboard-table tbody tr:last-child td {
            border-bottom: none;
        }

        .rank-number {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
            font-size: 14px;
        }

        .rank-1 {
            background: #FFD700;
            color: #8B6914;
        }

        .rank-2 {
            background: #C0C0C0;
            color: #555;
        }

        .rank-3 {
            background: #CD7F32;
            color: #fff;
        }

        .rank-other {
            background: #E0E0E0;
            color: var(--text-gray);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--navy-light);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-dark);
        }

        .user-paket {
            font-size: 12px;
            color: var(--text-gray);
        }

        .badge-score {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
        }

        .badge-score.high {
            background: #E8F5E9;
            color: var(--green);
        }

        .badge-score.medium {
            background: #FFF3E0;
            color: #FF9800;
        }

        .badge-score.low {
            background: #FFEBEE;
            color: var(--red);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 8px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            background: var(--white);
            color: var(--text-dark);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .pagination button:hover {
            border-color: var(--navy);
            color: var(--navy);
        }

        .pagination button.active {
            background: var(--navy);
            color: var(--white);
            border-color: var(--navy);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .leaderboard-table {
                overflow-x: auto;
            }

            .leaderboard-table table {
                min-width: 600px;
            }

            .leaderboard-header h1 {
                font-size: 28px;
            }

            .filter-leaderboard {
                flex-direction: column;
                align-items: center;
            }

            .filter-leaderboard select {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="UPCADEMI" style="height: 40px;">
                <span>UPCADEMI</span>
            </a>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html">Beranda</a>
                <a href="packages.html">Paket</a>
                <a href="leaderboard.html" style="background: rgba(255,255,255,0.15);">Peringkat</a>
                <a href="register.html" class="btn-register">Daftar</a>
                <a href="login.html" class="btn-login">Login</a>
            </div>
        </div>
    </nav>

    <!-- ===== LEADERBOARD SECTION ===== -->
    <section class="leaderboard-page">
        <div class="container">
            <div class="leaderboard-header">
                <h1>🏆 Peringkat Siswa</h1>
                <p>Lihat peringkat siswa berdasarkan skor tryout tertinggi</p>
            </div>

            <!-- Filter -->
            <div class="filter-leaderboard">
                <select id="filterPaket">
                    <option value="all">Semua Paket</option>
                    <option value="CPNS Master">CPNS Master</option>
                    <option value="UTBK Pro">UTBK Pro</option>
                    <option value="Kedinasan Plus">Kedinasan Plus</option>
                    <option value="Starter">Starter</option>
                    <option value="Pro">Pro</option>
                    <option value="Ultimate">Ultimate</option>
                </select>
                <select id="filterPeriode">
                    <option value="all">Semua Waktu</option>
                    <option value="today">Hari Ini</option>
                    <option value="week">Minggu Ini</option>
                    <option value="month">Bulan Ini</option>
                </select>
            </div>

            <!-- Tabel -->
            <div class="leaderboard-table">
                <table>
                    <thead>
                        <tr>
                            <th style="width:60px;">Rank</th>
                            <th>Nama</th>
                            <th style="width:150px;">Paket</th>
                            <th style="width:100px; text-align:center;">Skor</th>
                            <th style="width:120px; text-align:center;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <!-- Data akan di-generate JS -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <!-- JS akan generate -->
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="tentang.html">Tentang Kami</a>
                <a href="kontak.html">Kontak</a>
                <a href="privasi.html">Kebijakan Privasi</a>
                <a href="syarat.html">Syarat & Ketentuan</a>
            </div>
            <div class="copyright">&copy; 2026 UPCADEMI. All rights reserved.</div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // ===== DATA CONTOH (nanti dari database) =====
        const leaderboardData = [
            { rank: 1, name: 'Budi Santoso', paket: 'CPNS Master', score: 95, status: 'Lulus' },
            { rank: 2, name: 'Siti Rahayu', paket: 'UTBK Pro', score: 92, status: 'Lulus' },
            { rank: 3, name: 'Andi Wijaya', paket: 'Kedinasan Plus', score: 88, status: 'Lulus' },
            { rank: 4, name: 'Rina Anggraeni', paket: 'CPNS Master', score: 85, status: 'Lulus' },
            { rank: 5, name: 'Dedi Kurniawan', paket: 'Pro', score: 82, status: 'Lulus' },
            { rank: 6, name: 'Lisa Marlina', paket: 'UTBK Pro', score: 78, status: 'Perlu Belajar' },
            { rank: 7, name: 'Rudi Hartono', paket: 'Starter', score: 75, status: 'Perlu Belajar' },
            { rank: 8, name: 'Maya Sari', paket: 'Ultimate', score: 72, status: 'Perlu Belajar' },
            { rank: 9, name: 'Eko Prasetyo', paket: 'CPNS Master', score: 68, status: 'Perlu Belajar' },
            { rank: 10, name: 'Dewi Lestari', paket: 'Kedinasan Plus', score: 65, status: 'Perlu Belajar' },
            { rank: 11, name: 'Fajar Nugroho', paket: 'UTBK Pro', score: 60, status: 'Perlu Belajar' },
            { rank: 12, name: 'Tuti Handayani', paket: 'Pro', score: 55, status: 'Perlu Belajar' },
            { rank: 13, name: 'Hendra Gunawan', paket: 'Starter', score: 50, status: 'Perlu Belajar' },
            { rank: 14, name: 'Nina Wulandari', paket: 'Ultimate', score: 48, status: 'Perlu Belajar' },
            { rank: 15, name: 'Agus Saputra', paket: 'CPNS Master', score: 45, status: 'Perlu Belajar' }
        ];

        let currentPage = 1;
        const itemsPerPage = 10;

        // ===== RENDER LEADERBOARD =====
        function renderLeaderboard(page = 1) {
            const filterPaket = document.getElementById('filterPaket').value;
            const filterPeriode = document.getElementById('filterPeriode').value;

            let filteredData = [...leaderboardData];

            // Filter paket
            if (filterPaket !== 'all') {
                filteredData = filteredData.filter(item => item.paket === filterPaket);
            }

            // Filter periode (simulasi)
            if (filterPeriode === 'today') {
                filteredData = filteredData.slice(0, 5);
            } else if (filterPeriode === 'week') {
                filteredData = filteredData.slice(0, 10);
            } else if (filterPeriode === 'month') {
                filteredData = filteredData.slice(0, 15);
            }

            // Hitung pagination
            const totalItems = filteredData.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, totalItems);
            const pageData = filteredData.slice(startIndex, endIndex);

            // Render tabel
            const tbody = document.getElementById('leaderboardBody');

            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="icon">📊</div>
                                <p>Belum ada data peringkat untuk filter ini</p>
                            </div>
                        </td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = pageData.map((item, index) => {
                    const rankClass = item.rank === 1 ? 'rank-1' : 
                                     item.rank === 2 ? 'rank-2' : 
                                     item.rank === 3 ? 'rank-3' : 'rank-other';

                    const scoreClass = item.score >= 80 ? 'high' : 
                                      item.score >= 60 ? 'medium' : 'low';

                    const initials = item.name.split(' ').map(n => n[0]).join('').slice(0, 2);

                    return `
                        <tr>
                            <td><span class="rank-number ${rankClass}">${item.rank}</span></td>
                            <td>
                                <div class="user-info">
                                    <div class="user-avatar">${initials}</div>
                                    <div>
                                        <div class="user-name">${item.name}</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="user-paket">${item.paket}</span></td>
                            <td style="text-align:center; font-weight:700; color:var(--navy);">${item.score}</td>
                            <td style="text-align:center;">
                                <span class="badge-score ${scoreClass}">${item.status}</span>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            // Render pagination
            renderPagination(totalPages, page);
        }

        // ===== RENDER PAGINATION =====
        function renderPagination(totalPages, currentPage) {
            const container = document.getElementById('pagination');

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>⬅</button>`;

            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>➡</button>`;

            container.innerHTML = html;
        }

        // ===== GO TO PAGE =====
        function goToPage(page) {
            const filterPaket = document.getElementById('filterPaket').value;
            const filterPeriode = document.getElementById('filterPeriode').value;

            let filteredData = [...leaderboardData];
            if (filterPaket !== 'all') {
                filteredData = filteredData.filter(item => item.paket === filterPaket);
            }
            if (filterPeriode === 'today') {
                filteredData = filteredData.slice(0, 5);
            } else if (filterPeriode === 'week') {
                filteredData = filteredData.slice(0, 10);
            } else if (filterPeriode === 'month') {
                filteredData = filteredData.slice(0, 15);
            }

            const totalPages = Math.ceil(filteredData.length / itemsPerPage);

            if (page < 1 || page > totalPages) return;

            currentPage = page;
            renderLeaderboard(page);
        }

        // ===== EVENT LISTENER FILTER =====
        document.getElementById('filterPaket').addEventListener('change', function() {
            currentPage = 1;
            renderLeaderboard(1);
        });

        document.getElementById('filterPeriode').addEventListener('change', function() {
            currentPage = 1;
            renderLeaderboard(1);
        });

        // ===== INIT =====
        renderLeaderboard(1);
    </script>

</body>
</html>
