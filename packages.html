<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paket Tryout - UPCADEMI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .packages-page {
            padding: 60px 0;
        }

        .packages-page h1 {
            text-align: center;
            font-size: 36px;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .packages-page .subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 40px;
            font-size: 18px;
        }

        .filter-section {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .filter-btn {
            padding: 10px 24px;
            border: 2px solid var(--navy);
            background: transparent;
            color: var(--navy);
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--navy);
            color: var(--white);
        }

        .package-grid-full {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .package-card-full {
            background: var(--white);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
            text-align: center;
            border-top: 6px solid var(--navy);
            position: relative;
        }

        .package-card-full:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .package-card-full.popular {
            border-top-color: var(--red);
        }

        .badge-category {
            display: inline-block;
            background: var(--navy-light);
            color: var(--white);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        @media (max-width: 992px) {
            .package-grid-full {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .package-grid-full {
                grid-template-columns: 1fr;
                max-width: 400px;
                margin: 0 auto;
            }
            .packages-page h1 {
                font-size: 28px;
            }
            .filter-section {
                gap: 8px;
            }
            .filter-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="UPCADEMI" style="height: 40px;">
                <span>UPCADEMI</span>
            </a>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html">Beranda</a>
                <a href="packages.html">Paket</a>
                <a href="leaderboard.html">Peringkat</a>
                <div id="navbarLogin">
                    <!-- Diisi oleh JavaScript -->
                </div>
            </div>
        </div>
    </nav>

    <!-- ===== PACKAGES SECTION ===== -->
    <section class="packages-page">
        <div class="container">
            <h1>Semua Paket Tryout</h1>
            <p class="subtitle">Pilih paket sesuai kebutuhan dan target ujianmu</p>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="cpns">CPNS</button>
                <button class="filter-btn" data-filter="utbk">UTBK</button>
                <button class="filter-btn" data-filter="kedinasan">Kedinasan</button>
            </div>

            <div class="package-grid-full" id="packageGrid">
                <!-- Akan diisi oleh JavaScript -->
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="tentang.html">Tentang Kami</a>
                <a href="kontak.html">Kontak</a>
                <a href="privasi.html">Kebijakan Privasi</a>
                <a href="syarat.html">Syarat & Ketentuan</a>
            </div>
            <div class="copyright">&copy; 2026 UPCADEMI. All rights reserved.</div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // ===== AMBIL DATA PAKET DARI LOCALSTORAGE =====
        function getPaket() {
            try {
                const data = localStorage.getItem('paketUpcademi');
                return data ? JSON.parse(data) : [];
            } catch(e) {
                return [];
            }
        }

        // ===== RENDER SEMUA PAKET =====
        function renderPackages() {
            const grid = document.getElementById('packageGrid');
            if (!grid) return;

            const paket = getPaket();

            if (paket.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align:center; padding:60px 20px; color:var(--text-gray);">
                        <div style="font-size:48px; margin-bottom:16px;">📦</div>
                        <h3>Belum ada paket tryout</h3>
                        <p>Silakan tambahkan paket melalui dashboard admin.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            paket.forEach((item, index) => {
                const isPopular = index === 0 ? 'popular' : '';
                const features = item.features ? item.features.split(',').map(f => f.trim()) : [];
                
                html += `
                    <div class="package-card-full ${isPopular}" data-category="${item.category.toLowerCase()}">
                        ${index === 0 ? `<div class="badge-popular">Paling Laris</div>` : ''}
                        <span class="badge-category">${item.category}</span>
                        <div class="package-name">${item.name}</div>
                        <div class="package-price">Rp${parseInt(item.price).toLocaleString('id-ID')} <small>/paket</small></div>
                        <p class="package-desc">${item.description || 'Persiapan tryout terbaik'}</p>
                        <ul class="package-features">
                            ${features.map(f => `<li>${f}</li>`).join('')}
                            <li>Akses ${item.duration}</li>
                        </ul>
                        <a href="checkout.html?paket=${item.id}" class="btn-buy">Beli Sekarang</a>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // ===== FILTER PAKET =====
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const filter = this.dataset.filter;
                const cards = document.querySelectorAll('.package-card-full');

                cards.forEach(card => {
                    if (filter === 'all' || card.dataset.category === filter) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });

        // ===== UPDATE NAVBAR =====
        function updateNavbar() {
            const container = document.getElementById('navbarLogin');
            if (!container) return;

            const isAdmin = localStorage.getItem('isAdmin') === 'true';
            const isLoggedIn = localStorage.getItem('userEmail') !== null;

            if (isLoggedIn) {
                if (isAdmin) {
                    container.innerHTML = `
                        <a href="dashboard-admin.html" style="background: rgba(255,255,255,0.15);">Admin</a>
                        <a href="#" onclick="logout()" class="btn-login">Logout</a>
                    `;
                } else {
                    container.innerHTML = `
                        <a href="dashboard-user.html" style="background: rgba(255,255,255,0.15);">Dashboard</a>
                        <a href="#" onclick="logout()" class="btn-login">Logout</a>
                    `;
                }
            } else {
                container.innerHTML = `
                    <a href="register.html" class="btn-register">Daftar</a>
                    <a href="login.html" class="btn-login">Login</a>
                `;
            }
        }

        function logout() {
            if (confirm('Yakin ingin logout?')) {
                localStorage.removeItem('isAdmin');
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userName');
                window.location.href = 'index.html';
            }
        }

        // ===== JALANKAN SAAT HALAMAN LOAD =====
        document.addEventListener('DOMContentLoaded', function() {
            renderPackages();
            updateNavbar();
        });
    </script>

</body>
</html>
