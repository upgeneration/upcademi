<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UPCADEMI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: var(--gray-bg);
        }

        .auth-box {
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 420px;
            width: 100%;
        }

        .auth-box h2 {
            text-align: center;
            color: var(--navy);
            margin-bottom: 8px;
            font-size: 28px;
        }

        .auth-box .subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 30px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-dark);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
            background: var(--white);
        }

        .form-group input:focus {
            border-color: var(--navy);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-auth:hover {
            background: var(--red-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-gray);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--red);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #FFEBEE;
            color: var(--red-dark);
            border: 1px solid #FFCDD2;
        }

        .alert-success {
            background: #E8F5E9;
            color: var(--green);
            border: 1px solid #C8E6C9;
        }

        /* Role indicator */
        .role-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 8px;
        }

        .role-badge.admin {
            background: #FFEBEE;
            color: var(--red);
        }

        .role-badge.user {
            background: #E8EAF6;
            color: var(--navy);
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="UPCADEMI" style="height: 40px;">
                <span>UPCADEMI</span>
            </a>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html">Beranda</a>
                <a href="packages.html">Paket</a>
                <a href="leaderboard.html">Peringkat</a>
                <a href="register.html" class="btn-register">Daftar</a>
                <a href="login.html" class="btn-login">Login</a>
            </div>
        </div>
    </nav>

    <!-- ===== AUTH SECTION ===== -->
    <section class="auth-page">
        <div class="auth-box">
            <h2>Masuk</h2>
            <p class="subtitle">Login untuk melanjutkan tryout</p>

            <div class="alert alert-error" id="alert-error">
                Email atau password salah. Silakan coba lagi.
            </div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Masukkan email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required minlength="6">
                </div>

                <button type="submit" class="btn-auth">Login</button>
            </form>

<div class="auth-footer">
    Belum punya akun? <a href="register.html">Daftar Sekarang</a>
</div>
</section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="tentang.html">Tentang Kami</a>
                <a href="kontak.html">Kontak</a>
                <a href="privasi.html">Kebijakan Privasi</a>
                <a href="syarat.html">Syarat & Ketentuan</a>
            </div>
            <div class="copyright">&copy; 2026 UPCADEMI. All rights reserved.</div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertError = document.getElementById('alert-error');

            alertError.style.display = 'none';

            // Validasi
            if (!email || !password) {
                alertError.textContent = 'Semua field wajib diisi!';
                alertError.style.display = 'block';
                return false;
            }

            // ===== CEK LOGIN ADMIN =====
            if (email === 'admin@upcademi.com' && password === 'admin123') {
                // Simpan session admin
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', 'Administrator');
                window.location.href = 'dashboard-admin.html';
                return true;
            }

            // ===== CEK LOGIN USER BIASA =====
            // (Simulasi: semua email selain admin dianggap user biasa)
            if (email && password.length >= 6) {
    localStorage.setItem('isAdmin', 'false');
    localStorage.setItem('userEmail', email);
    localStorage.setItem('userName', email.split('@')[0] || 'User'); // <-- TAMBAHKAN INI
    window.location.href = 'dashboard-user.html';
    return true;
}

            // Jika gagal
            alertError.textContent = 'Email atau password salah!';
            alertError.style.display = 'block';
            return false;
        }
    </script>

</body>
</html>
