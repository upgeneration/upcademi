<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UPCADEMI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: var(--gray-bg);
        }

        .auth-box {
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 420px;
            width: 100%;
        }

        .auth-box h2 {
            text-align: center;
            color: var(--navy);
            margin-bottom: 8px;
            font-size: 28px;
        }

        .auth-box .subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 30px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-dark);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
            background: var(--white);
        }

        .form-group input:focus {
            border-color: var(--navy);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1);
        }

        /* ===== PASSWORD WITH EYE ===== */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 0;
            color: var(--text-gray);
            transition: 0.3s;
        }

        .toggle-password:hover {
            color: var(--navy);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-auth:hover {
            background: var(--red-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-gray);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--red);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #FFEBEE;
            color: var(--red-dark);
            border: 1px solid #FFCDD2;
        }

        .alert-success {
            background: #E8F5E9;
            color: var(--green);
            border: 1px solid #C8E6C9;
        }

        /* ===== RIWAYAT LOGIN ===== */
        .riwayat-login {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 2px solid var(--gray-bg);
        }

        .riwayat-login h4 {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .riwayat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .riwayat-item:last-child {
            border-bottom: none;
        }

        .riwayat-item .email {
            color: var(--text-dark);
            font-weight: 600;
        }

        .riwayat-item .waktu {
            color: var(--text-gray);
            font-size: 12px;
        }

        .riwayat-item .badge-role {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .riwayat-item .badge-role.admin {
            background: #FFEBEE;
            color: var(--red);
        }

        .riwayat-item .badge-role.user {
            background: #E8EAF6;
            color: var(--navy);
        }

        .riwayat-empty {
            text-align: center;
            color: var(--text-gray);
            font-size: 13px;
            padding: 12px 0;
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="UPCADEMI" style="height: 40px;">
                <span>UPCADEMI</span>
            </a>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html">Beranda</a>
                <a href="packages.html">Paket</a>
                <a href="leaderboard.html">Peringkat</a>
                <a href="register.html" class="btn-register">Daftar</a>
                <a href="login.html" class="btn-login">Login</a>
            </div>
        </div>
    </nav>

    <!-- ===== AUTH SECTION ===== -->
    <section class="auth-page">
        <div class="auth-box">
            <h2>Masuk</h2>
            <p class="subtitle">Login untuk melanjutkan tryout</p>

            <div class="alert alert-error" id="alert-error">
                Email atau password salah. Silakan coba lagi.
            </div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Masukkan email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Masukkan password" required minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            👁️
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-auth">Login</button>
            </form>

            <div class="auth-footer">
                Belum punya akun? <a href="register.html">Daftar Sekarang</a>
            </div>

            <!-- ===== RIWAYAT LOGIN ===== -->
            <div class="riwayat-login">
                <h4>📋 Riwayat Login</h4>
                <div id="riwayatContainer">
                    <!-- JS akan generate -->
                </div>
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="tentang.html">Tentang Kami</a>
                <a href="kontak.html">Kontak</a>
                <a href="privasi.html">Kebijakan Privasi</a>
                <a href="syarat.html">Syarat & Ketentuan</a>
            </div>
            <div class="copyright">&copy; 2026 UPCADEMI. All rights reserved.</div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // ===== TOGGLE PASSWORD =====
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        // ===== RIWAYAT LOGIN =====
        function getRiwayatLogin() {
            const data = localStorage.getItem('riwayatLogin');
            return data ? JSON.parse(data) : [];
        }

        function saveRiwayatLogin(email, role) {
            const riwayat = getRiwayatLogin();
            const now = new Date();
            const waktu = now.toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            }) + ' ' + now.toLocaleTimeString('id-ID', {
                hour: '2-digit',
                minute: '2-digit'
            });

            riwayat.push({
                email: email,
                role: role,
                waktu: waktu,
                timestamp: now.getTime()
            });

            // Simpan maksimal 10 riwayat
            if (riwayat.length > 10) {
                riwayat.shift();
            }

            localStorage.setItem('riwayatLogin', JSON.stringify(riwayat));
        }

        function renderRiwayat() {
            const container = document.getElementById('riwayatContainer');
            if (!container) return;

            const riwayat = getRiwayatLogin();

            if (riwayat.length === 0) {
                container.innerHTML = `<div class="riwayat-empty">Belum ada riwayat login</div>`;
                return;
            }

            // Tampilkan terbaru di atas
            const sorted = [...riwayat].reverse();

            container.innerHTML = sorted.map(item => {
                const roleClass = item.role === 'admin' ? 'admin' : 'user';
                const roleText = item.role === 'admin' ? '👑 Admin' : '👤 User';
                return `
                    <div class="riwayat-item">
                        <div>
                            <div class="email">${item.email}</div>
                            <div class="waktu">${item.waktu}</div>
                        </div>
                        <span class="badge-role ${roleClass}">${roleText}</span>
                    </div>
                `;
            }).join('');
        }

        // ===== HANDLE LOGIN =====
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertError = document.getElementById('alert-error');

            alertError.style.display = 'none';

            if (!email || !password) {
                alertError.textContent = 'Semua field wajib diisi!';
                alertError.style.display = 'block';
                return false;
            }

            // ===== CEK LOGIN ADMIN =====
            if (email === 'admin@upcademi.com' && password === 'admin123') {
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', 'Administrator');
                saveRiwayatLogin(email, 'admin');
                window.location.href = 'dashboard-admin.html';
                return true;
            }

            // ===== CEK LOGIN USER BIASA =====
            if (email && password.length >= 6) {
                localStorage.setItem('isAdmin', 'false');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', email.split('@')[0] || 'User');
                saveRiwayatLogin(email, 'user');
                window.location.href = 'dashboard-user.html';
                return true;
            }

            alertError.textContent = 'Email atau password salah!';
            alertError.style.display = 'block';
            return false;
        }

        // ===== JALANKAN SAAT HALAMAN LOAD =====
        document.addEventListener('DOMContentLoaded', function() {
            renderRiwayat();
        });
    </script>

</body>
</html>
